    backend:
        build: ./backend
        container_name: node_backend
        ports:
            - "8080:8080" # Backend runs on port 8080
        env_file:
            - ./backend/.env # Load environment variables from backend .env file
        develop:
            watch:
                - action: rebuild
                  path: ./backend
                  target: /app
                - action: rebuild
                  path: ./backend/package.json
        #depends_on:
        #    - redis
        #     - mongodb
        volumes:
            - ./backend/logs:/app/logs
            - ./backend/repoCloning:/app/repoCloning

